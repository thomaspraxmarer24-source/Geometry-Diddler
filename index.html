<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#090318" />
    <meta name="mobile-web-app-capable" content="yes" />

    <title>Neon Rush: 12 Trials</title>

    <link rel="stylesheet" crossorigin href="/assets/index-QDYDMa33.css">
  </head>
  <body>
    <div id="app">
      <div id="game"></div>
      <section id="menu" class="screen">
        <div class="logo"><span>NEON</span> RUSH<small>12 TRIALS</small></div>
        <p class="tagline">Ein Tap. Kein Erbarmen.</p>
        <button id="play-current" class="primary">LEVEL 1 STARTEN</button>
        <div class="levels-heading"><span>LEVEL-AUSWAHL</span><i></i></div>
        <div id="level-grid" class="level-grid"></div>
        <p class="controls">Tippe den Bildschirm oder drücke <b>LEERTASTE</b>, um zu springen.</p>
      </section>
      <section id="hud" class="hud hidden">
        <div class="progress-wrap"><span id="progress-label">0%</span><div class="progress"><i id="progress-fill"></i></div></div>
        <div class="level-chip"><span id="hud-level">LEVEL 1</span><small id="hud-name">FIRST LIGHT</small></div>
        <button id="pause" class="icon-button" aria-label="Pause">Ⅱ</button>
      </section>
      <section id="pause-panel" class="modal hidden">
        <h2>PAUSE</h2><p id="pause-level-name"></p>
        <button id="resume" class="primary">WEITER</button>
        <button id="restart" class="secondary">NEUSTART</button>
        <button id="quit" class="text-button">ZUR LEVEL-AUSWAHL</button>
      </section>
      <section id="result" class="modal hidden"></section>
      <div id="rotate-note">Bitte drehe dein Gerät ins Querformat.</div>
    </div>
  </body>
</html>
